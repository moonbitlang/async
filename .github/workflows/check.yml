name: check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  stable-build:
    strategy:
      fail-fast: false
      matrix:
        os: ["windows-latest"]

    runs-on: ${{ matrix.os }}
    continue-on-error: false
    timeout-minutes: 10
    steps:
      - name: disable auto CRLF
        if: ${{ matrix.os == 'windows-latest' }}
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '>=22.4.0'
      - name: install MSVC (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        uses: ilammy/msvc-dev-cmd@v1

      - name: install (Unix)
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: install (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser; irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "C:\Users\runneradmin\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: load SSH key for testing (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: certutil -p test -user -importPFX My ./test_keys/cert.p12 NoRoot

      - name: patch runtime to support backtarce (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: cp patched_runtime.c ~/.moon/lib/runtime.c

      - name: moon version
        run: |
          moon version --all
          moonrun --version

      - name: setup debug symbol
        run: |
          moon run --debug --manifest-path src/process/test_programs/moon.mod.json src/process/test_programs/setup_debug_symbol -- src

      - name: moon test
        run: |
          for ($i = 0; $i -le 100; $i++) {
            moon test src/tls
          }

  nightly-build:
    strategy:
      fail-fast: false
      matrix:
        os: ["windows-latest"]

    runs-on: ${{ matrix.os }}
    continue-on-error: false
    timeout-minutes: 10
    steps:
      - name: disable auto CRLF
        if: ${{ matrix.os == 'windows-latest' }}
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '>=22.4.0'

      - name: install MSVC (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        uses: ilammy/msvc-dev-cmd@v1

      - name: install (Unix)
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash -s nightly
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: install (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        env:
          MOONBIT_INSTALL_VERSION: nightly
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser; irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "C:\Users\runneradmin\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: load SSH key for testing (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: certutil -p test -user -importPFX My ./test_keys/cert.p12 NoRoot

      - name: patch runtime to support backtarce (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: cp patched_runtime.c ~/.moon/lib/runtime.c

      - name: moon version
        run: |
          moon version --all
          moonrun --version

      - name: setup debug symbol
        run: |
          moon run --debug --manifest-path src/process/test_programs/moon.mod.json src/process/test_programs/setup_debug_symbol -- src

      - name: moon test
        run: |
          for ($i = 0; $i -le 100; $i++) {
            moon test src/tls
          }

  sanitizer-check-windows:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: disable auto CRLF
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '>=22.4.0'

      - uses: ilammy/msvc-dev-cmd@v1

      - name: install
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser; irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "C:\Users\runneradmin\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: load SSH key for testing (Windows)
        run: certutil -p test -user -importPFX My ./test_keys/cert.p12 NoRoot

      - name: patch runtime to support backtarce (Windows)
        run: cp patched_runtime.c ~/.moon/lib/runtime.c

      - name: moon version
        run: |
          moon version --all
          moonrun --version

      - name: moon update
        run: |
          moon update

      - name: disable mimalloc
        run: |
          echo "" >dummy_libmoonbitrun.c
          $out_path = Convert-Path ~/.moon/lib/libmoonbitrun.o
          cl.exe dummy_libmoonbitrun.c /c /Fo: $out_path

      - name: setup sanitizer check
        run: |
          moon run --debug --manifest-path src/process/test_programs/moon.mod.json src/process/test_programs/setup_sanitizer_check

      - name: run test with address sanitizer
        run: |
          $env:ASAN_OPTIONS='fast_unwind_on_malloc=0'
          for ($i = 0; $i -le 100; $i++) {
            moon test src/tls
          }
