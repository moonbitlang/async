name: check

on:
  push:
    branches:
      - main
  pull_request:

env:
  MOONBIT_ASYNC_CHECK_FD_LEAK: 1

jobs:
  sanitizer-check-windows:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: disable auto CRLF
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '>=22.4.0'

      - uses: ilammy/msvc-dev-cmd@v1

      - name: install
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser; irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "C:\Users\runneradmin\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: moon version
        run: |
          moon version --all
          moonrun --version

      - name: moon update
        run: |
          moon update

      - name: disable mimalloc
        run: |
          echo "" >dummy_libmoonbitrun.c
          $out_path = Convert-Path ~/.moon/lib/libmoonbitrun.o
          cl.exe dummy_libmoonbitrun.c /c /Fo: $out_path

      - name: setup sanitizer check
        run: |
          moon run --debug test_programs/setup_sanitizer_check

      - name: run test with address sanitizer
        run: |
          $env:ASAN_OPTIONS='fast_unwind_on_malloc=0'
          $env:MOONBIT_ASYNC_TEST_SANITIZER_ENABLED=1
          moon test src/fs/watch_test.mbt -F 'watch rename within'
